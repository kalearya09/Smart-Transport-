name: smart_trans
description: Smart Transport Flutter Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🗺 Map & Location
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  flutter_typeahead: ^5.2.0

  # 📍 GPS & Permissions
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # 🌐 Networking
  http: ^1.2.0

  # 🔥 Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0

  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
