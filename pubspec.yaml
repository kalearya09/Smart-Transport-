name: smart_transport
description: Smart Transport - Real-time Public Transport Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_database: ^10.4.0
  firebase_messaging: ^14.7.10

  # Mapbox
  mapbox_maps_flutter: ^2.1.0

  # Location
  geolocator: ^10.1.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.4.0

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  google_fonts: ^6.1.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
